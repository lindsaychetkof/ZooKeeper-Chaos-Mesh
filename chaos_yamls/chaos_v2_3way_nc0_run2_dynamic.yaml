apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: v2-3way-nc0-r2
  namespace: default
spec:
  action: partition
  mode: all
  selector:
    namespaces:
      - default
    expressionSelectors:
      - key: statefulset.kubernetes.io/pod-name
        operator: In
        values:
          - zookeeper-0
  direction: both
  target:
    mode: all
    selector:
      namespaces:
        - default
      expressionSelectors:
        - key: statefulset.kubernetes.io/pod-name
          operator: In
          values:
          - zookeeper-1
          - zookeeper-2
  duration: "60s"
