apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: zk-leader-partition
  namespace: default
spec:
  action: partition
  mode: all
  # Source: the leader we are isolating
  selector:
    namespaces:
      - default
    expressionSelectors:
      - key: statefulset.kubernetes.io/pod-name
        operator: In
        values:
          - zookeeper-1
  # Drop traffic in both directions on the source pod
  direction: both
  # Target: the two followers — explicitly excludes zookeeper-1 to avoid
  # self-partition side-effects
  target:
    mode: all
    selector:
      namespaces:
        - default
      expressionSelectors:
        - key: statefulset.kubernetes.io/pod-name
          operator: In
          values:
            - zookeeper-0
            - zookeeper-2
  duration: "60s"
